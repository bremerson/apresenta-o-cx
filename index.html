<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeC | Ecosystem +Experience</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="custom-cursor"></div>
    <canvas id="bg-canvas"></canvas>

    <nav class="glass-nav">
        <div class="nav-content">
            <div class="logo">AeC <span class="thin">STRATEGY</span></div>
            <div class="nav-stats">
                <div class="stat-pill">ROI POTENTIAL <span class="highlight">+13.3MM</span></div>
            </div>
        </div>
    </nav>

    <section class="viewport">
        <header class="main-header">
            <div class="reveal-box">
                <span class="eyebrow">Decision Intelligence</span>
                <h1 class="split-text">Mais Performance.<br>Mais <span class="gradient">Movimento.</span></h1>
                <p class="lead-text">O ecossistema que transforma a dor operacional em decisão estratégica através de IA e correlação de dados em tempo real.</p>
            </div>
        </header>

        <div class="bento-container" id="grid-hub">
            </div>
    </section>

    <div class="side-panel" id="detail-panel">
        <div class="panel-blur"></div>
        <div class="panel-content">
            <button class="close-btn" onclick="ui.closePanel()">&times;</button>
            <div id="panel-body">
                </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
